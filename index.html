<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>🍜 일본어 번역기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #1a1a2e; min-height: 100vh; color: #fff; padding-bottom: 40px; }

header { background: linear-gradient(135deg, #e8472e, #c0392b); padding: 14px 20px; text-align: center; box-shadow: 0 3px 15px rgba(0,0,0,0.4); position: sticky; top: 0; z-index: 200; }
header h1 { font-size: 1.2rem; font-weight: 700; }
header p { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; }

.tabs { display: flex; background: #16213e; border-bottom: 2px solid #0f3460; position: sticky; top: 52px; z-index: 100; }
.tab-btn { flex: 1; padding: 12px 4px; background: transparent; border: none; color: #888; font-size: 0.82rem; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.tab-btn.active { color: #e74c3c; border-bottom-color: #e74c3c; background: #1a2a4a; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.section { padding: 16px; max-width: 750px; margin: 0 auto; }

/* API KEY */
.apikey-box { background: #16213e; border-radius: 14px; padding: 14px; margin-bottom: 16px; border: 1px solid #0f3460; }
.apikey-box h3 { font-size: 0.88rem; color: #f39c12; margin-bottom: 10px; }
.apikey-row { display: flex; gap: 8px; align-items: center; }
.apikey-input { flex: 1; padding: 10px 12px; background: #0f1e3a; border: 1px solid #0f3460; border-radius: 10px; color: #fff; font-size: 0.8rem; outline: none; font-family: monospace; }
.apikey-input:focus { border-color: #e74c3c; }
.apikey-input::placeholder { color: #444; }
.icon-btn { background: #0f3460; border: none; color: #aaa; padding: 10px 13px; border-radius: 10px; cursor: pointer; font-size: 1rem; }
.save-btn { background: #e74c3c; border: none; color: white; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-size: 0.82rem; font-weight: 700; white-space: nowrap; }
.save-btn:hover { opacity: 0.88; }
.apikey-status { font-size: 0.76rem; margin-top: 7px; min-height: 16px; }
.apikey-hint { font-size: 0.72rem; color: #555; margin-top: 5px; line-height: 1.5; }
.apikey-hint a { color: #3498db; text-decoration: none; }

/* UPLOAD */
.upload-area { border: 2px dashed #e74c3c; border-radius: 14px; padding: 32px 20px; text-align: center; cursor: pointer; background: #16213e; transition: background 0.2s; margin-bottom: 14px; }
.upload-area:hover { background: #1e2d50; }
.upload-icon { font-size: 2.5rem; margin-bottom: 10px; }
.upload-area p { font-size: 0.85rem; color: #aaa; line-height: 1.7; }
.upload-area strong { color: #e74c3c; }
#fileInput { display: none; }

/* PREVIEW */
.preview-wrap { display: none; margin-bottom: 14px; position: relative; }
.preview-wrap img { width: 100%; border-radius: 12px; display: block; box-shadow: 0 4px 18px rgba(0,0,0,0.4); }
.change-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.65); border: none; color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.76rem; }

.translate-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; display: none; margin-bottom: 14px; }
.translate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.status-box { border-radius: 10px; padding: 11px 14px; font-size: 0.84rem; margin-bottom: 12px; display: none; background: #16213e; }

/* RESULT TABS */
.result-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
.result-tab-btn { flex: 1; padding: 10px; background: #16213e; border: 2px solid #0f3460; border-radius: 10px; color: #888; font-size: 0.84rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.result-tab-btn.active { border-color: #e74c3c; color: #e74c3c; background: #1a2a4a; }

/* OVERLAY */
.overlay-section { display: none; }
.overlay-container { position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin-bottom: 14px; background: #000; }
.overlay-container img { width: 100%; display: block; }
.overlay-container canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.overlay-hint { font-size: 0.76rem; color: #666; text-align: center; margin-bottom: 14px; }

/* MENU CARD SECTION */
.menu-section { display: none; }
.summary-box { background: #0f3460; border-radius: 10px; padding: 10px 14px; font-size: 0.8rem; color: #aaa; margin-bottom: 16px; border-left: 3px solid #3498db; }
.summary-box span { color: #f0f0f0; }
.menu-result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.menu-result-header h3 { font-size: 0.9rem; color: #e74c3c; }
.dl-btn { background: #27ae60; border: none; color: white; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 0.76rem; font-weight: 700; }

/* CATEGORY */
.category-block { margin-bottom: 20px; }
.category-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #0f3460; }
.category-icon { font-size: 1.2rem; }
.category-name { font-size: 0.88rem; font-weight: 700; color: #f39c12; }
.category-count { font-size: 0.72rem; color: #555; background: #0f3460; padding: 2px 8px; border-radius: 20px; }

/* MENU CARD */
.menu-cards { display: flex; flex-direction: column; gap: 10px; }
.menu-card { background: #16213e; border-radius: 12px; padding: 10px 12px; border: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; transition: border-color 0.2s; }
.menu-card:hover { border-color: #1a5276; }
.menu-card-left { flex: 1; min-width: 0; }
.menu-name-ko { font-size: 0.88rem; font-weight: 700; color: #7effc0; margin-bottom: 4px; }
.menu-name-jp { font-size: 0.73rem; color: #f5d08a; margin-bottom: 2px; }
.menu-pronunciation { font-size: 0.72rem; color: #f39c12; }
.menu-note { font-size: 0.7rem; color: #888; margin-top: 5px; font-style: italic; }
.menu-card-right { text-align: right; flex-shrink: 0; }
.menu-price { font-size: 0.9rem; font-weight: 700; color: #e74c3c; white-space: nowrap; }
.menu-price-note { font-size: 0.7rem; color: #555; margin-top: 2px; }

/* NON-MENU CARD */
.info-card { background: #12192e; border-radius: 12px; padding: 11px 14px; border: 1px solid #0a1f3a; }
.info-text-ko { font-size: 0.82rem; color: #bbb; margin-bottom: 3px; }
.info-text-jp { font-size: 0.76rem; color: #555; }
.info-pronunciation { font-size: 0.7rem; color: #7a6a2a; margin-top: 2px; }

.spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>🍜 일본어 번역기</h1>
  <p>사진 찍고 바로 번역 · 여행용</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('upload', this)">📸 번역하기</button>
  <button class="tab-btn" onclick="switchTab('result', this)" id="resultTabBtn" style="display:none;">✅ 결과보기</button>
</div>

<!-- TAB: 번역하기 -->
<div id="tab-upload" class="tab-content active">
  <div class="section">

    <div class="apikey-box">
      <h3>🔑 Claude API 키</h3>
      <div class="apikey-row">
        <input type="password" id="apikeyInput" class="apikey-input" placeholder="sk-ant-api03-..." spellcheck="false" autocomplete="off">
        <button class="icon-btn" onclick="toggleKeyVis()">👁</button>
        <button class="save-btn" onclick="saveApiKey()">저장</button>
        <button class="icon-btn" onclick="deleteApiKey()" title="키 삭제">🗑</button>
      </div>
      <div class="apikey-status" id="apikeyStatus"></div>
      <div class="apikey-hint">
        키는 이 기기 로컬에 저장됩니다 (브라우저 localStorage)<br>
        발급: <a href="https://console.anthropic.com/keys" target="_blank">console.anthropic.com/keys</a>
      </div>
    </div>

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📸</div>
      <p><strong>사진 업로드</strong><br>메뉴판 · 간판 · 안내문<br>일본어가 포함된 이미지</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" alt="미리보기">
      <button class="change-btn" onclick="document.getElementById('fileInput').click()">🔄 변경</button>
    </div>

    <button class="translate-btn" id="translateBtn" onclick="doTranslate()">🔍 번역하기</button>
    <div class="status-box" id="statusBox"></div>

  </div>
</div>

<!-- TAB: 결과보기 -->
<div id="tab-result" class="tab-content">
  <div class="section">

    <div class="result-tabs">
      <button class="result-tab-btn active" onclick="switchResult('overlay', this)">🖼 이미지 오버레이</button>
      <button class="result-tab-btn" onclick="switchResult('menu', this)">🍽 메뉴 카드</button>
    </div>

    <!-- 오버레이 -->
    <div class="overlay-section" id="overlaySection">
      <div class="overlay-container">
        <img id="overlayImg" alt="원본 이미지">
        <canvas id="overlayCanvas"></canvas>
      </div>
      <p class="overlay-hint">한국어 번역이 원본 위에 표시됩니다</p>
    </div>

    <!-- 메뉴 카드 -->
    <div class="menu-section" id="menuSection">
      <div class="summary-box" id="summaryBox"></div>
      <div class="menu-result-header">
        <h3>🍽 메뉴 카드</h3>
        <button class="dl-btn" onclick="downloadResult()">💾 저장</button>
      </div>
      <div id="menuCards"></div>
    </div>

  </div>
</div>

<script>
var savedApiKey = localStorage.getItem('claude_apikey') || '';
var selectedFile = null;
var lastParsed = null;
var uploadedDataUrl = null;

window.addEventListener('DOMContentLoaded', function() {
  if (savedApiKey) {
    document.getElementById('apikeyInput').value = savedApiKey;
    var st = document.getElementById('apikeyStatus');
    st.style.color = '#2ecc71';
    st.textContent = '✅ 저장된 API 키를 불러왔습니다.';
  }
});

function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function switchResult(name, btn) {
  document.querySelectorAll('.result-tab-btn').forEach(function(el){ el.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('overlaySection').style.display = name === 'overlay' ? 'block' : 'none';
  document.getElementById('menuSection').style.display = name === 'menu' ? 'block' : 'none';
}

function toggleKeyVis() {
  var inp = document.getElementById('apikeyInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function saveApiKey() {
  var val = document.getElementById('apikeyInput').value.trim();
  var st = document.getElementById('apikeyStatus');
  if (!val) { st.style.color='#e74c3c'; st.textContent='❌ API 키를 입력해주세요.'; return; }
  if (!val.startsWith('sk-ant-')) { st.style.color='#f39c12'; st.textContent='⚠️ sk-ant- 로 시작해야 합니다.'; return; }
  savedApiKey = val;
  try { localStorage.setItem('claude_apikey', val); } catch(e) {}
  st.style.color='#2ecc71'; st.textContent='✅ 저장 완료! 다음에도 자동으로 불러옵니다.';
}

function deleteApiKey() {
  savedApiKey = '';
  try { localStorage.removeItem('claude_apikey'); } catch(e) {}
  document.getElementById('apikeyInput').value = '';
  var st = document.getElementById('apikeyStatus');
  st.style.color='#aaa'; st.textContent='🗑 키가 삭제되었습니다.';
}

function handleFile(e) {
  var file = e.target.files[0];
  if (!file) return;
  selectedFile = file;
  var reader = new FileReader();
  reader.onload = function(ev) {
    uploadedDataUrl = ev.target.result;
    document.getElementById('previewImg').src = uploadedDataUrl;
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('translateBtn').style.display = 'block';
    document.getElementById('statusBox').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function doTranslate() {
  if (!savedApiKey) { alert('먼저 API 키를 입력하고 저장해주세요.'); return; }
  if (!selectedFile) return;

  var btn = document.getElementById('translateBtn');
  var status = document.getElementById('statusBox');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>번역 중...';
  status.style.display = 'block';
  status.style.color = '#aaa';
  status.textContent = '🤖 AI가 이미지를 분석하고 있습니다...';

  var b64 = uploadedDataUrl.split(',')[1];
  var mediaType = selectedFile.type || 'image/jpeg';

  var prompt = '이 이미지의 일본어 텍스트를 모두 찾아 분석하세요.\n' +
    '메뉴판이라면 카테고리별로 분류하고, 메뉴가 아닌 텍스트도 별도 카테고리로 묶어주세요.\n' +
    '가격(円, ¥ 등)이 보이면 해당 메뉴의 price 필드에 반드시 포함하세요.\n' +
    '+100円처럼 추가 요금도 price에 넣고, 가격 없으면 빈 문자열로 두세요.\n' +
    '각 텍스트의 이미지 내 위치도 퍼센트(%)로 추정해주세요.\n\n' +
    '반드시 아래 JSON만 출력하세요 (설명 없이):\n' +
    '{"summary":"이미지 전체 한줄 설명","categories":[{"name":"카테고리명","icon":"이모지","items":[' +
    '{"japanese":"원본 일본어","pronunciation":"한국어 발음(예:라멘)","korean":"한국어 번역",' +
    '"price":"가격(없으면 빈문자열)","note":"비고나 설명(없으면 빈문자열)","is_menu":true,' +
    '"x":10,"y":20,"w":40,"h":5}]}]}\n\n' +
    'is_menu: 메뉴 항목이면 true, 안내문/제목/기타 텍스트면 false\n' +
    'x,y는 텍스트 좌측상단 위치(%), w,h는 텍스트 영역 크기(%)';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': savedApiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 3000,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: b64 } },
        { type: 'text', text: prompt }
      ]}]
    })
  })
  .then(function(res) {
    if (!res.ok) return res.json().then(function(e){ throw new Error(e.error && e.error.message || '오류 ' + res.status); });
    return res.json();
  })
  .then(function(data) {
    var text = data.content.map(function(i){ return i.text||''; }).join('');
    lastParsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    renderResults();
    status.style.display = 'none';
    document.getElementById('resultTabBtn').style.display = 'block';
    switchTab('result', document.getElementById('resultTabBtn'));
    switchResult('overlay', document.querySelector('.result-tab-btn'));
  })
  .catch(function(err) {
    status.style.color = '#e74c3c';
    status.textContent = '❌ ' + err.message;
  })
  .finally(function() {
    btn.disabled = false;
    btn.innerHTML = '🔍 다시 번역하기';
  });
}

function renderResults() {
  if (!lastParsed) return;

  // 요약
  document.getElementById('summaryBox').innerHTML = '📍 <span>' + escHtml(lastParsed.summary || '') + '</span>';

  // 메뉴 카드 렌더링
  var container = document.getElementById('menuCards');
  container.innerHTML = '';
  var cats = lastParsed.categories || [];
  cats.forEach(function(cat) {
    var block = document.createElement('div');
    block.className = 'category-block';

    var header = '<div class="category-header">' +
      '<span class="category-icon">' + escHtml(cat.icon || '📌') + '</span>' +
      '<span class="category-name">' + escHtml(cat.name || '') + '</span>' +
      '<span class="category-count">' + (cat.items || []).length + '개</span>' +
      '</div>';

    var cards = '<div class="menu-cards">';
    (cat.items || []).forEach(function(item) {
      if (item.is_menu) {
        cards += '<div class="menu-card">' +
          '<div class="menu-card-left">' +
            '<div class="menu-name-ko">' + escHtml(item.korean || '') + '</div>' +
            '<div class="menu-name-jp">' + escHtml(item.japanese || '') +
              (item.pronunciation ? ' <span class="menu-pronunciation">(' + escHtml(item.pronunciation) + ')</span>' : '') +
            '</div>' +
            (item.note ? '<div class="menu-note">' + escHtml(item.note) + '</div>' : '') +
          '</div>' +
          '<div class="menu-card-right">' +
            (item.price ? '<div class="menu-price">' + escHtml(item.price) + '</div>' : '') +
          '</div>' +
        '</div>';
      } else {
        cards += '<div class="info-card">' +
          '<div class="info-text-ko">' + escHtml(item.korean || '') + '</div>' +
          '<div class="info-text-jp">' + escHtml(item.japanese || '') +
            (item.pronunciation ? ' <span class="info-pronunciation">(' + escHtml(item.pronunciation) + ')</span>' : '') +
          '</div>' +
        '</div>';
      }
    });
    cards += '</div>';

    block.innerHTML = header + cards;
    container.appendChild(block);
  });

  // 오버레이 캔버스
  var allItems = [];
  (lastParsed.categories || []).forEach(function(cat){ allItems = allItems.concat(cat.items || []); });

  var overlayImg = document.getElementById('overlayImg');
  overlayImg.src = uploadedDataUrl;
  overlayImg.onload = function() {
    var canvas = document.getElementById('overlayCanvas');
    canvas.width = overlayImg.naturalWidth;
    canvas.height = overlayImg.naturalHeight;
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var W = canvas.width, H = canvas.height;

    allItems.forEach(function(item) {
      var px = (item.x / 100) * W;
      var py = (item.y / 100) * H;
      var phRaw = Math.max((item.h / 100) * H, H * 0.04);
      var fontSize = Math.max(11, Math.min(Math.round(phRaw * 0.50), H * 0.042));

      ctx.font = 'bold ' + fontSize + 'px Arial, sans-serif';
      var koText = item.korean || '';
      var priceText = item.price ? '  ' + item.price : '';

      // 텍스트 너비로 박스 너비 계산 (최소 12%, 최대 68%)
      var measuredW = ctx.measureText(koText + priceText).width;
      var pw = Math.min(Math.max(measuredW + 18, W * 0.12), W * 0.68);
      var ph = phRaw;

      // 배경 박스
      ctx.fillStyle = 'rgba(20, 20, 40, 0.85)';
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(px, py, pw, ph, 5);
      else ctx.rect(px, py, pw, ph);
      ctx.fill();
      ctx.strokeStyle = 'rgba(231, 76, 60, 0.75)';
      ctx.lineWidth = 1.2;
      ctx.stroke();

      // 가격 너비 예약
      var priceDrawW = item.price ? ctx.measureText(item.price).width + 8 : 0;
      var maxKoW = pw - priceDrawW - 10;

      // 한국어 텍스트 (왼쪽)
      ctx.fillStyle = '#7effc0';
      ctx.textBaseline = 'middle';
      var dispKo = koText;
      while (ctx.measureText(dispKo).width > maxKoW && dispKo.length > 2) {
        dispKo = dispKo.slice(0, -1);
      }
      if (dispKo !== koText) dispKo += '…';
      ctx.fillText(dispKo, px + 5, py + ph / 2);

      // 가격 (오른쪽, 주황색)
      if (item.price) {
        ctx.fillStyle = '#f39c12';
        ctx.fillText(item.price, px + pw - priceDrawW, py + ph / 2);
      }
    });
  };

  document.getElementById('overlaySection').style.display = 'block';
  document.getElementById('menuSection').style.display = 'none';
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function downloadResult() {
  if (!lastParsed) return;
  var lines = [lastParsed.summary || ''];
  (lastParsed.categories || []).forEach(function(cat) {
    lines.push('\n[' + cat.name + ']');
    (cat.items || []).forEach(function(item) {
      var parts = [item.japanese, '(' + (item.pronunciation||'') + ')', item.korean];
      if (item.price) parts.push(item.price);
      if (item.note) parts.push(item.note);
      lines.push(parts.join('\t'));
    });
  });
  var blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '번역결과.txt';
  a.click();
}
</script>
</body>
</html>
